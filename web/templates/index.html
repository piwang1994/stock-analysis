<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个股深度分析 · 网页版</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="page-home">
  <main class="shell">
    <header class="hero-block">
      <p class="eyebrow">A 股 · akshare 数据</p>
      <h1>个股深度分析</h1>
      <p class="lead">输入股票代码，自动采集全维度数据并在浏览器中渲染完整 HTML 研报（K 线、财务、股东、新闻等）。</p>
    </header>

    <form class="search-card" action="/report/" method="get" id="reportForm">
      <label for="code">股票代码</label>
      <div class="search-row">
        <input
          id="code"
          name="code"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          placeholder="例如 600519、000066"
          value="{{ default_code }}"
          required
          maxlength="12"
        >
        <button type="submit">生成报告</button>
      </div>
      <div class="options-row">
        <label for="years">K 线年限</label>
        <select id="years" name="years">
          <option value="1">1 年</option>
          <option value="2">2 年</option>
          <option value="3" selected>3 年</option>
          <option value="5">5 年</option>
        </select>
      </div>
      <p class="hint">首次生成约需 2–5 分钟；同一股票 1 小时内会使用缓存。</p>
    </form>

    <section class="quick-links">
      <span>快捷：</span>
      <a href="/report/600519">贵州茅台</a>
      <a href="/report/000066">中国长城</a>
      <a href="/report/002594">比亚迪</a>
      <a href="/examples/demo">示例研报（深度版）</a>
    </section>

    <footer class="disclaimer">
      仅供学习研究，不构成投资建议。数据来源：akshare 等公开接口。
    </footer>
  </main>
  <script>
    document.getElementById("reportForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const raw = document.getElementById("code").value.trim();
      const digits = raw.replace(/\D/g, "").slice(-6);
      if (digits.length !== 6) {
        alert("请输入 6 位 A 股代码");
        return;
      }
      const years = document.getElementById("years").value;
      window.location.href = "/report/" + digits + "?years=" + years;
    });
  </script>
</body>
</html>
